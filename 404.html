<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Unblocked Browser</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f11;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .browser-header {
            background-color: #1a1b1f;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid #2b2c32;
        }
        .logo-badge {
            background: #2b2c32;
            color: #4ade80; 
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .tab-title {
            color: #9ca3af;
            font-size: 13px;
            margin-right: 10px;
        }
        .address-bar {
            flex-grow: 1;
            background-color: #25262b;
            border: 1px solid #383a42;
            padding: 8px 16px;
            border-radius: 20px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
            transition: border 0.2s;
        }
        .address-bar:focus {
            border: 1px solid #4ade80;
        }
        .browser-viewport {
            width: 100%;
            height: calc(100vh - 54px);
            border: none;
            background-color: #141517;
        }
        .welcome-screen {
            position: absolute;
            top: 54px;
            left: 0;
            width: 100%;
            height: calc(100vh - 54px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #141517;
            z-index: 10;
        }
        .welcome-title {
            font-size: 32px;
            color: #4ade80;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .welcome-sub {
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>
<body>

    <div class="browser-header">
        <div class="logo-badge">U</div>
        <div class="tab-title">Utopia Tabs</div>
        <input type="text" id="urlBar" class="address-bar" placeholder="Enter URL or search freely...">
    </div>

    <div id="welcomeArea" class="welcome-screen">
        <div class="welcome-title">Utopia Tabs</div>
        <div class="welcome-sub">Type a web address or search term above and press Enter to begin</div>
    </div>

    <iframe id="browserFrame" class="browser-viewport" src="about:blank"></iframe>

    <script>
        const urlBar = document.getElementById('urlBar');
        const browserFrame = document.getElementById('browserFrame');
        const welcomeArea = document.getElementById('welcomeArea');

        // Registers the routing framework
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Proxy active.'))
                .catch(err => console.error('Engine error:', err));
        }

        urlBar.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                let inputUrl = urlBar.value.trim();
                if (inputUrl === "") return;

                welcomeArea.style.display = "none";

                // Formats bare queries into standard search strings
                if (!inputUrl.includes('.') || inputUrl.includes(' ')) {
                    inputUrl = "https://bing.com" + encodeURIComponent(inputUrl);
                } else if (!/^https?:\/\//i.test(inputUrl)) {
                    inputUrl = "https://" + inputUrl;
                }

                // CHANGED: Fixed path routing for subfolders on GitHub Pages
                let proxyUrl = "./proxy/" + btoa(inputUrl);
                browserFrame.src = proxyUrl;
            }
        });
    </script>

</body>
</html>
